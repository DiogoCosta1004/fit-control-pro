<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl Pro - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@5/dark.css">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-left" id="particles-js">
            <div class="login-branding" data-aos="fade-right" data-aos-duration="1000">
                <div class="logo">
                    <i class="fa-solid fa-wallet"></i>
                    <h1>FinControl <span>Pro</span></h1>
                </div>
                <p>O ecossistema definitivo para o controle inteligente do seu patrimônio.</p>
                
                <div class="glass-feature-card">
                    <i class="fa-solid fa-chart-line text-secondary"></i>
                    <div>
                        <h4>Gestão Inteligente</h4>
                        <span>Acompanhe seus rendimentos em tempo real.</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-right">
            <div class="login-box glass-panel animate__animated animate__fadeInUp">
                <h2>Bem-vindo de volta</h2>
                <p class="subtitle">Acesse sua conta para continuar</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Senha</label>
                        <div class="input-icon-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••" required>
                            <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-actions">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            Lembrar-me
                        </label>
                        <a href="#" class="forgot-password">Esqueci minha senha</a>
                    </div>

                    <button type="submit" class="btn-primary" id="loginBtn">
                        <span>Entrar</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <div class="divider">
                    <span>ou continue com</span>
                </div>

                <div class="social-login">
                    <button class="btn-social" id="googleLoginBtn">
                        <i class="fa-brands fa-google"></i> Google
                    </button>
                    <button class="btn-social" id="githubLoginBtn">
                        <i class="fa-brands fa-github"></i> Github
                    </button>
                </div>

                <p class="register-link">Não tem uma conta? <a href="cadastro.html">Criar conta</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
    
    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
    
    <script>
        AOS.init();
        particlesJS.load('particles-js', 'assets/animations/particles.json', function() {
            // Em produção, criar o arquivo particles.json na pasta assets.
            // Para o código rodar sem o arquivo, inicializamos com conf padrão abaixo:
        });
        particlesJS("particles-js", {"particles":{"number":{"value":80,"density":{"enable":true,"value_area":800}},"color":{"value":"#4F46E5"},"shape":{"type":"circle"},"opacity":{"value":0.5,"random":false},"size":{"value":3,"random":true},"line_linked":{"enable":true,"distance":150,"color":"#06B6D4","opacity":0.4,"width":1},"move":{"enable":true,"speed":2,"direction":"none","random":false,"straight":false,"out_mode":"out","bounce":false}},"interactivity":{"detect_on":"canvas","events":{"onhover":{"enable":true,"mode":"grab"},"onclick":{"enable":true,"mode":"push"},"resize":true},"modes":{"grab":{"distance":140,"line_linked":{"opacity":1}},"push":{"particles_nb":4}}},"retina_detect":true});
        
        // Toggle Password Visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
